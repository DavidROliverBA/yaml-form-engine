form:
  id: mcp-notion-search
  title: Search Notion
  description: Search for pages and databases in Notion by title.
  version: '1.0'
  steps:
    - id: parameters
      title: Search Parameters
      type: input
      fields:
        - id: query
          label: Search Query
          type: text
          required: true
        - id: filter_object_type
          label: Filter by Type
          type: radio
          options:
            - value: page
              label: Pages
            - value: database
              label: Databases
        - id: page_size
          label: Results Limit
          type: slider
          min: 1
          max: 20
          default: 10
    - id: review
      title: Review
      type: info
      content: |-
        Review your search parameters before submitting.

        **Tool:** `API-post-search`

        **Server:** `MCP_DOCKER`
    - id: submit
      title: Submit
      type: submit
      mcp:
        server: MCP_DOCKER
        tool: API-post-search
      confirm: true
      show_payload: true
