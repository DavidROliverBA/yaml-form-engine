form:
  id: mcp-confluence-search
  title: Search Confluence
  description: Search Confluence pages and spaces using CQL (Confluence Query Language).
  version: '1.0'
  steps:
    - id: parameters
      title: Search Parameters
      type: input
      fields:
        - id: cql
          label: CQL Query
          type: textarea
          required: true
          placeholder: 'e.g., type = page AND space = "ENG" AND text ~ "architecture"'
        - id: limit
          label: Max Results
          type: slider
          min: 1
          max: 20
          default: 10
    - id: review
      title: Review
      type: info
      content: |-
        Review your CQL query before searching.

        **Tool:** `searchConfluenceUsingCql`

        **Server:** `plugin_atlassian_atlassian`
    - id: submit
      title: Submit
      type: submit
      mcp:
        server: plugin_atlassian_atlassian
        tool: searchConfluenceUsingCql
      confirm: true
      show_payload: true
